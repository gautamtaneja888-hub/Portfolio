<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Under Maintenance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f9fafb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 420px;
        }

        h1 {
            font-size: 2.2rem;
            color: #111827;
            margin-bottom: 10px;
        }

        p {
            color: #6b7280;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .loader {
            width: 45px;
            height: 45px;
            margin: 20px auto;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #111827;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 10px;
            background: #111827;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #374151;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚙️ Working on it...</h1>
    <div class="loader"></div>
    <p>This page is currently facing some issues.<br>I'm fixing it. Please come back soon!</p>
    <a href="/" class="btn">⬅ Back to Website</a>
</div>

</body>
</html>
